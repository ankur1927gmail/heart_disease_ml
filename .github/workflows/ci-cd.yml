name: CI/CD for Heart Disease App

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8

      - name: Run linting
        run: |
          python -m flake8 . --exclude=.git,venv,venv312,.venv,__pycache__

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: heart-disease:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6371CA5967904200BCFEF04A6B24FE3C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_15F8A37359544D79A66E993FC2EF5BA5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_94F2F1658EE3484D9A0BBEBF6B1C29B9 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'HeartDiseaseAnalysis'
          slot-name: 'Production'
          images: 'testdockerankur.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_03AB2D883D2143F0ACF5B21CD0C3916E }}/heart-disease:${{ github.sha }}'
