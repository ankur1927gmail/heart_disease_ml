# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - HeartDiseaseAnalysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: testdockerankur.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_03AB2D883D2143F0ACF5B21CD0C3916E }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_5DEAB01FF2744551A99E264C60911579 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: testdockerankur.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_03AB2D883D2143F0ACF5B21CD0C3916E }}/heart-disease:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6371CA5967904200BCFEF04A6B24FE3C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_15F8A37359544D79A66E993FC2EF5BA5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_94F2F1658EE3484D9A0BBEBF6B1C29B9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'HeartDiseaseAnalysis'
          slot-name: 'Production'
          images: 'testdockerankur.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_03AB2D883D2143F0ACF5B21CD0C3916E }}/heart-disease:${{ github.sha }}'
          